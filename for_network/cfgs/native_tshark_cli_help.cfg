
#                       TShark CLI Usage Guide
# =============================================================================================
#  TShark (Terminal-based Wireshark) is a powerful network traffic analysis tool.
#  This guide provides useful commands and examples for common packet capture tasks.
#
#  Basic Commands:
# ------------------------------------------------------------------------
#   List all available interfaces:                               --> tshark -D
#   Capture live traffic on an interface:                        --> sudo tshark -i <interface>
#   Capture packets for a specific duration (e.g., 60 seconds):  --> sudo tshark -i <interface> -a duration:60
#   Capture and save packets to a file:                          --> sudo tshark -i <interface> -w capture.pcap
#   Read a previously captured pcap file:                        --> tshark -r capture.pcap
#
#  Filtering Packets:
# ------------------------------------------------------------------------
#   Filter for a specific protocol (e.g., HTTP, DNS, ICMP):                 --> sudo tshark -i <interface> -Y "http || dns"
#   Show only packets from a specific source IP:                            --> sudo tshark -i <interface> -Y "ip.src == 192.168.1.1"
#   Show only packets to a specific destination IP:                         --> sudo tshark -i <interface> -Y "ip.dst == 8.8.8.8"
#   Show only packets containing a specific port (e.g., 443 for HTTPS):     --> sudo tshark -i <interface> -Y "tcp.port == 443"
#
#  Packet Inspection:
# ------------------------------------------------------------------------
#   Display verbose output for detailed packet analysis:                        --> sudo tshark -i <interface> -V
#   Show only HTTP request methods (GET, POST, etc.):                           --> sudo tshark -i <interface> -Y "http.request.method"
#   Extract specific fields from packets (e.g., source and destination IPs):    --> sudo tshark -i <interface> -T fields -e ip.src -e ip.dst
#   
#  File Operations:
# ------------------------------------------------------------------------
#   Convert a pcap file to JSON format:            --> tshark -r capture.pcap -T json > output.json
#   Extract only specific fields from a pcap file: --> tshark -r capture.pcap -T fields -e ip.src -e ip.dst -e tcp.port
#   
#  Advanced Usage:
# ------------------------------------------------------------------------
#   Capture traffic in the background and write to a file:                      --> sudo tshark -i <interface> -w capture.pcap &
#   Limit packet capture to a specific number of packets (e.g., 100 packets):   --> sudo tshark -i <interface> -c 100
#   Capture only specific packet lengths (e.g., packets larger than 500 bytes): --> sudo tshark -i <interface> -Y "frame.len > 500"
#   Monitor traffic with live updates and display in real time:                 --> sudo tshark -i <interface> -l
#  
# =============================================================================================
#  Notes:
#   - TShark requires [ root/sudo ] privileges to capture live traffic.
#   - To list available interfaces, always use `tshark -D` before starting a capture.
#   - Use `-Y` for display filters and `-f` for capture filters (applied at capture time).
# =============================================================================================
