# ========================== HELP NOTES: ====================================================================
#   
#       SELinux Configuration Check - Hosts Configuration File
#       ----------------------------------------------------------------------------
#       This file should contain a list of remote hosts/address where SELinux configurations need be checked:
#       Each entry should follow the format: * --> username@IP_or_Hostname
#       ----------------------------------------------------------------------------
#       Example entries for different environments:  
#
#       On-Premises Servers ----------------------
#           * --> admin@192.168.1.10  | On-premises server with private IP:
#           * --> devuser@1.2.3.4
#           * --> root@server01.local | On-premises server with hostname:
#
#       AWS EC2 Instances ------------------------
#           * --> ec2-user@ec2-3-91-23-45.compute-1.amazonaws.com  | Public DNS:
#           * --> ec2-user@192.168.1.25                            | Private IP within VPC:
#
#       Azure Virtual Machines -------------------
#           * --> azureuser@my-azure-vm.eastus.cloudapp.azure.com  | Public DNS:
#           * --> azureuser@10.0.0.4                               | Private IP within VNet:
#
# ==========================  MORE CLOUD HELP ====================================================================
#    Instructions:
#       1. -- Edit this file to add the required remote hosts:
#       2. -- Ensure SSH access:
#               - For [ public IP addresses  ]: | Verify that the necessary security group or network security group rules allow SSH (port 22) from your source IP:
#               - For [ private IP addresses ]: | Ensure connectivity via VPN or Direct Connect/ExpressRoute from your network to the cloud environment:
#       3. -- Run the SELinux check script: `selinux_check.sh` to fetch policies.
#    
#    ----------------------------------------------------------------------------
#    Additional Information: --> Public vs. Private IP Addresses:
#    * --> Public IP:  Accessible over the internet. Ensure security groups or firewalls permit SSH access from your IP:
#    * --> Private IP: Accessible only within the internal network or via VPN. Requires a secure connection from your on-premises network to the cloud environment:
#
#    ----------------------------------------------------------------------------
#    AWS - Amazon Web Services:
#    * --> VPC a (Virtual Private Cloud): - Isolated network within AWS where you can launch resources:
#          More info: https://docs.aws.amazon.com/vpc/latest/userguide/what-is-vpc.html
#
#    * --> Connecting to Private Instances:
#          VPN:                   Establish a VPN connection between your on-premises network and AWS to access instances with private IPs:
#          EC2 Instance Connect:  Allows secure SSH access without a public IP.
#          More info: https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/Connect-using-EC2-Instance-Connect.html
#
#    ----------------------------------------------------------------------------
#   Azure:
#   * --> VNet (Virtual Network): Azure's network offering, similar to AWS VPC:
#         More info: https://learn.microsoft.com/en-us/azure/virtual-network/virtual-networks-overview
#
#   * --> Connecting to Private VMs:
#         VPN Gateway: Set up a VPN to connect your on-premises network to Azure VNets:
#         More info: https://learn.microsoft.com/en-us/azure/vpn-gateway/vpn-gateway-about-vpngateways
#
#   * --> Azure Bastion: Provides secure RDP/SSH connectivity to VMs without exposing them to the public internet:
#         More info: https://learn.microsoft.com/en-us/azure/bastion/bastion-overview
#
#  ===========================================================================================================
#
#           Example Hosts (Uncomment and or modify as needed):
# admin@192.168.1.10                                            # <-- On-premises server:
# root@server01.local                                           # <-- On-premises server:
# ec2-user@ec2-3-91-23-45.compute-1.amazonaws.com               # <-- AWS EC2 with public DNS:
# ec2-user@192.168.1.25                                         # <-- AWS EC2 with private IP:
# azureuser@my-azure-vm.eastus.cloudapp.azure.com               # <-- Azure VM with public DNS:
# azureuser@10.0.0.4                                            # <-- Azure VM with private IP:
# ===========================================================================================================


