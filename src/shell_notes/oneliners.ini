# =====================================================================================
#    General System Information
# =====================================================================================
# Show system uptime and basic system stats:
    uptime; echo -e "\nHostname: $(hostname)"; echo -e "System Load: $(cat /proc/loadavg 2>/dev/null)"

# Show current directory, list files, and count them with size summary:
    uptime; echo -e "\nCurrent Directory: $(pwd)"; echo -e "\nFiles in Directory:"; ls -asl; echo -e "\nTotal File Count and Size:"; find . -type f -exec du -sh {} + | awk '{sum += $1} END {print "Count:", NR, "Total Size:", sum " KB"}'
    uptime; echo "\nCurrent Directory: $(pwd)"; echo "\nFiles in Directory:"; ls -asl; echo "\nTotal File Count and Size:"; find . -type f -exec du -sh {} + | awk '{sum += $1} END {print "Count:", NR, "Total Size:", sum " KB"}'

# Show disk usage, available space, and mounted partitions:
    df -hT | grep -E "Filesystem|/dev"

# Show system memory usage:
free -h 
free -gth

# Show CPU usage and system processes sorted by CPU usage:
    ps -eo pid,ppid,cmd,%mem,%cpu --sort=-%cpu | head -20

# =====================================================================================
#   File & Directory Operations
# =====================================================================================
# Count files and directories in the current path
    echo -e "Files: $(find . -type f | wc -l), Directories: $(find . -type d | wc -l)"

# Show largest 10 files in the current directory
    du -ah . | sort -rh | head -10

# Find and delete files older than 30 days
    find . -type f -mtime +30 -exec rm -f {} \;

# List symbolic links in the current directory
    find . -type l -ls

# Find and replace text in all `.txt` files in the current directory
    grep -rl "old_text" . | xargs sed -i 's/old_text/new_text/g'

# Generate a tree structure of the current directory
    tree .

# =====================================================================================
#    Networking & Connectivity
# =====================================================================================
# Get external IP address
    curl --help | grep -E "Usage:| -[A-Za-z]"
    curl -s ifconfig.me
    curl -s ipinfo.io | jq -r '.ip, .city, .country'
    echo -e "Public IP: $(curl -s ifconfig.me)"
    echo -e "Public IP: $(curl -s https://checkip.amazonaws.com)"
    curl -s https://ipinfo.io

# Ping test with timestamped output
    ping -c 5 google.com | while read line; do echo "$(date): $line"; done

# Show open network ports
    netstat -tulnp

# Monitor real-time network connections
    sudo tcpdump -i any -c 50 -nn

# Test internet speed using `speedtest-cli`
    speedtest-cli --simple

# =====================================================================================
#  Process & Performance Monitoring
# =====================================================================================
# Show top 10 CPU-consuming processes
    ps -eo pid,ppid,cmd,%mem,%cpu --sort=-%cpu | head -10

# Show top 10 memory-consuming processes
    ps -eo pid,ppid,cmd,%mem,%cpu --sort=-%mem | head -10

# Monitor disk I/O in real-time
    iostat -dx 1 5

# Watch live system resource usage
    htop
    btop
    top

# =====================================================================================
#  Logs & System Monitoring
# =====================================================================================
# Show last 50 lines of system log
    tail -n 50 /var/log/syslog

# Monitor logs in real-time
    tail -f /var/log/syslog

# Show failed SSH login attempts
    cat /var/log/auth.log | grep "Failed password"

# =====================================================================================
#   Compression & Archiving
# =====================================================================================
# Compress a directory into a tar.gz file
    tar -czvf archive.tar.gz /path/to/directory

# Extract a tar.gz file
    tar -xzvf archive.tar.gz

# Find and compress all `.log` files in a directory
    find . -type f -name "*.log" -exec tar -czvf logs.tar.gz {} +

# =====================================================================================
#   Miscellaneous Useful One-Liners
# =====================================================================================
# Convert spaces to underscores in filenames
    for file in *; do mv "$file" "$(echo $file | tr ' ' '_')"; done

# Find all executable files in a directory
    find . -type f -executable -ls

# Find files larger than 100MB
    find . -type f -size +100M

# Generate a strong random password
    openssl rand -base64 16

# Monitor a file for changes
    watch -n 1 ls -lh file.txt

# Run a command every 10 seconds (useful for live monitoring)
    watch -n 10 "df -h"
# =====================================================================================
